name: OpenCode — Code Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
      comment_id:
        description: 'Triggering comment ID'
        required: true

jobs:
  code-review:
    # This workflow is triggered by issue_comment because general PR comments
    # are issue comments in GitHub's event model. We enforce PR-only below.
    if: |
      (github.event_name == 'workflow_dispatch' && github.actor == 'phuhl') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/oc code-review') &&
       github.actor == 'phuhl')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: Assert this is a PR comment
        if: github.event_name != 'workflow_dispatch'
        run: |
          if [ -z "${{ github.event.issue.pull_request }}" ]; then
            echo "This workflow only runs on PR comments, not issue comments."
            exit 1
          fi
          echo "Confirmed: comment is on a PR."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install OpenCode
        run: npm install -g opencode-ai@1.14.24

      - name: Run review-pr skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_DISABLE_EXTERNAL_SKILLS: "true"
        run: |
          PR="${{ github.event.issue.number || github.event.inputs.pr_number }}"
          COMMENT="${{ github.event.comment.id || github.event.inputs.comment_id }}"
          opencode run "Load the review-pr skill and run it for PR #${PR} with comment ID ${COMMENT}"

      - name: React to triggering PR comment
        if: success() && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" -f content="+1" || true

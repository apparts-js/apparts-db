name: Run API Tests
on:
  push:
    branches: [master, v2]
  pull_request:
    branches: [master, v2]

jobs:
  runner-job:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run ci:prettier
      - name: Lint
        run: npm run ci:eslint
      - name: Register TypeScript problem matcher
        run: echo "::add-matcher::.github/problem-matchers/tsc.json"
      - name: Type check
        run: npm run ci:tsc
      - name: Remove TypeScript problem matcher
        if: always()
        run: echo "::remove-matcher owner=tsc::"
      - name: Run tests
        run: npm run ci:test
        env:
          # The hostname used to communicate with the PostgreSQL service container
          PG_TEST_CONFIG: 
          DYNAMO_TEST_CONFIG: ewogICAgInVzZSI6ICJkeW5hbW9kYiIsCiAgICAiZHluYW1vZGIiOiB7CiAgICAgICJyZWdpb24iOiAibG9jYWwiLAogICAgICAiZW5kcG9pbnQiOiAiaHR0cDovL2xvY2FsaG9zdDo4MDAwIiwKICAgICAgImFjY2Vzc0tleUlkIjogImxvY2FsIiwKICAgICAgInNlY3JldEFjY2Vzc0tleSI6ICJsb2NhbCIKICAgIH0KICB9

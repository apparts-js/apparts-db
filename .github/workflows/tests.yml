name: Run API Tests
on:
  push:
    branches: [master, v2]
  pull_request:
    branches: [master, v2]

jobs:
  runner-job:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run ci:prettier

      - name: Lint
        run: npm run ci:eslint

      - name: Register TypeScript problem matcher
        run: echo "::add-matcher::.github/problem-matchers/tsc.json"

      - name: Type check
        run: npm run ci:tsc

      - name: Remove TypeScript problem matcher
        if: always()
        run: echo "::remove-matcher owner=tsc::"

      - name: Run tests
        run: npm run ci:test
        env:
          DB_TEST_CONFIG: 

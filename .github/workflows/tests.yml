name: Run API Tests
on:
  push:
    branches: [master, v2]
  pull_request:
    branches: [master, v2]

jobs:
  # Label of the runner job
  runner-job:
    # You must use a Linux environment when using service containers or container jobs
    runs-on: ubuntu-latest

    # Service containers to run with `runner-job`
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres
        # Provide the password for postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
          - 5432:5432
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      # Downloads a copy of the code in your repository before running CI tests
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        # Runs a script that creates a PostgreSQL table, populates
        # the table with data, and then retrieves the data; also
        # runs DynamoDB tests against the dynamodb-local service
        # container.
        run: npm run ci
        env:
          # The hostname used to communicate with the PostgreSQL service container
          PG_TEST_CONFIG: 
          DYNAMO_TEST_CONFIG: ewogICAgInVzZSI6ICJkeW5hbW9kYiIsCiAgICAiZHluYW1vZGIiOiB7CiAgICAgICJyZWdpb24iOiAibG9jYWwiLAogICAgICAiZW5kcG9pbnQiOiAiaHR0cDovL2xvY2FsaG9zdDo4MDAwIiwKICAgICAgImFjY2Vzc0tleUlkIjogImxvY2FsIiwKICAgICAgInNlY3JldEFjY2Vzc0tleSI6ICJsb2NhbCIKICAgIH0KICB9
